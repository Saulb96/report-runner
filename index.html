<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report Runner</title>
<link rel="icon" href="favicon.png" />
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  :root{
    --ink:#16202c; --muted:#5f6c7d;
    --glass:rgba(255,255,255,.62); --glass2:rgba(255,255,255,.45);
    --edge:rgba(255,255,255,.75); --shadow:0 8px 32px rgba(31,45,75,.12);
    --design:#f2734a; --sales:#e0a92e; --production:#2f9bd6;
    --logistics:#36a37a; --finance:#9466d6; --hr:#d6608f; --accentink:#1b6fae;
    --ok:#1d7a55; --warn:#9a6e0d; --err:#c0392b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(135deg,#e8f0fa 0%,#f3eef9 45%,#eaf6f1 100%);
    overflow-x:hidden; -webkit-font-smoothing:antialiased;
  }
  #bgArt{position:fixed; inset:0; z-index:0; opacity:.55; pointer-events:none}
  .glass{
    background:var(--glass); backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);
    border:1px solid var(--edge); box-shadow:var(--shadow);
  }
  header,.wrap,.gate-card,.toast{position:relative; z-index:1}
  header{
    display:flex; align-items:center; justify-content:space-between;
    margin:16px; padding:14px 22px; border-radius:16px;
  }
  header .brand{display:flex; align-items:center; gap:12px}
  header .logo{
    width:34px; height:34px; border-radius:10px; display:grid; place-items:center;
    font-size:12px; font-weight:700; letter-spacing:.5px; color:#fff;
    background:linear-gradient(135deg,#2f9bd6,#1b6fae); box-shadow:0 4px 14px rgba(31,111,174,.35);
  }
  header h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.3px}
  .user{display:flex; align-items:center; gap:14px; font-size:13px; color:var(--muted)}
  .signout{font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer;
    background:none; border:none; font-family:inherit}
  .signout:hover{color:var(--ink)}

  .wrap{max-width:880px; margin:0 auto; padding:14px 22px 70px}
  .lead{color:var(--muted); font-size:14px; line-height:1.55; margin:6px 4px 20px}
  .lead strong{color:var(--ink); font-weight:600}

  .btn{
    font-family:inherit; font-size:13px; font-weight:500; letter-spacing:.2px;
    padding:9px 16px; border-radius:12px; cursor:pointer; transition:.13s;
    border:1px solid var(--edge); background:rgba(255,255,255,.75); color:var(--ink);
  }
  .btn:hover{background:#fff; transform:translateY(-1px); box-shadow:0 4px 12px rgba(31,45,75,.1)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.45; cursor:not-allowed; transform:none; box-shadow:none}
  .btn:focus-visible{outline:2px solid var(--accentink); outline-offset:2px}
  .btn.primary{
    color:#fff; border-color:transparent; font-weight:600;
    background:linear-gradient(135deg,#2f9bd6,#1b6fae); box-shadow:0 6px 20px rgba(31,111,174,.35);
  }
  .btn.primary:hover{filter:brightness(1.06); background:linear-gradient(135deg,#2f9bd6,#1b6fae)}

  .gate-card{max-width:430px; margin:13vh auto 0; text-align:center; padding:44px 34px; border-radius:20px}
  .gate-card .logo{
    width:50px; height:50px; margin:0 auto 18px; border-radius:14px; display:grid; place-items:center;
    font-size:15px; font-weight:700; letter-spacing:.5px; color:#fff;
    background:linear-gradient(135deg,#2f9bd6,#1b6fae); box-shadow:0 8px 26px rgba(31,111,174,.4);
  }
  .gate-card h2{margin:0 0 8px; font-weight:600; font-size:21px; letter-spacing:.2px}
  .gate-card p{color:var(--muted); margin:0 0 26px; font-size:14px; line-height:1.55}

  .grid{display:grid; gap:14px}
  .folder{border-radius:16px; overflow:hidden}
  .folder-head{
    width:100%; display:flex; align-items:center; gap:11px; cursor:pointer;
    padding:16px 18px; background:transparent; border:none; font-family:inherit;
    color:var(--ink); text-align:left; transition:background .13s;
  }
  .folder-head:hover{background:rgba(255,255,255,.4)}
  .folder-head:focus-visible{outline:2px solid var(--accentink); outline-offset:-2px}
  .folder-dot{width:10px; height:10px; border-radius:50%; flex:0 0 auto}
  .folder-dot.blue{background:var(--production)}
  .folder-dot.green{background:var(--logistics)}
  .folder-dot.orange{background:var(--design)}
  .folder-name{font-weight:600; font-size:14.5px; letter-spacing:.2px}
  .folder-count{
    font-size:11px; font-weight:600; color:var(--muted);
    background:rgba(22,32,44,.07); border-radius:999px; padding:2px 9px;
  }
  .chev{
    margin-left:auto; color:var(--muted); font-size:17px; line-height:1;
    transform:rotate(90deg); transition:transform .2s ease;
  }
  .folder.open .chev{transform:rotate(270deg)}
  .folder-body-wrap{
    display:grid; grid-template-rows:0fr; transition:grid-template-rows .22s ease;
  }
  .folder.open .folder-body-wrap{grid-template-rows:1fr}
  .folder-body{overflow:hidden; min-height:0}
  .folder-body-inner{display:grid; gap:10px; padding:4px 14px 16px}
  .folder-body .card{
    background:rgba(255,255,255,.5); border-color:rgba(255,255,255,.6);
    box-shadow:none;
  }
  .folder-body .card:hover{background:rgba(255,255,255,.72); box-shadow:0 6px 18px rgba(31,45,75,.1)}
  .empty{padding:34px; text-align:center; color:var(--muted); font-size:13.5px; border-radius:16px}
  .empty.err{color:var(--err)}
  @media (prefers-reduced-motion:reduce){ .chev,.folder-body-wrap{transition:none} }
  .card{
    padding:17px 19px; border-radius:16px;
    display:flex; align-items:center; justify-content:space-between; gap:18px;
    transition:.15s;
  }
  .card:hover{transform:translateY(-1px); box-shadow:0 12px 34px rgba(31,45,75,.14); background:rgba(255,255,255,.72)}
  .card .meta{min-width:0}
  .card .name{font-weight:600; font-size:15px; letter-spacing:.2px}
  .src-pill{
    display:inline-block; margin-top:8px; font-size:11px; font-weight:600; letter-spacing:.3px;
    padding:3px 10px; border-radius:999px;
  }
  .src-pill.blue {background:rgba(47,155,214,.14); color:var(--accentink)}
  .src-pill.green{background:rgba(54,163,122,.15); color:#1d7a55}
  .src-pill.orange{background:rgba(242,115,74,.15); color:#c2542c}
  .actions{display:flex; gap:9px; flex-shrink:0}
  .status{font-size:12.5px; color:var(--muted); margin-top:10px; min-height:16px; letter-spacing:.2px}
  .status.ok{color:var(--ok)} .status.err{color:var(--err)} .status.busy{color:var(--warn)}
  .spinner{display:inline-block; width:12px; height:12px; border:2px solid rgba(31,45,75,.18);
    border-top-color:var(--warn); border-radius:50%; animation:spin .7s linear infinite;
    vertical-align:-1px; margin-right:7px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    padding:12px 18px; border-radius:13px; font-size:13px; color:var(--ink);
    opacity:0; transition:opacity .2s; pointer-events:none; max-width:90%; z-index:5;
  }
  .toast.show{opacity:1}
  .hidden{display:none !important}

  @media (max-width:560px){
    .card{flex-direction:column; align-items:stretch}
    .actions{justify-content:flex-end}
  }
  @media (prefers-reduced-motion:reduce){ .card,.btn{transition:none} }
</style>
</head>
<body>
<canvas id="bgArt"></canvas>

<header class="glass">
  <div class="brand">
    <div class="logo">M1S</div>
    <h1>Report Runner</h1>
  </div>
  <div class="user">
    <span id="userName" class="hidden"></span>
    <button id="logoutBtn" class="signout hidden">Sign out</button>
  </div>
</header>

<div id="loginView" class="glass gate-card">
  <div class="logo">M1S</div>
  <h2>Reports Portal</h2>
  <p>Sign in to run any report on demand and download it here or send it to your inbox.</p>
  <button id="loginBtn" class="btn primary">Sign in with Microsoft</button>
</div>

<div id="appView" class="wrap hidden">
  <p class="lead"><strong>Download</strong> saves the file to this device. <strong>Email me</strong> sends it to your inbox — and only yours.</p>
  <div id="reportGrid" class="grid"></div>
</div>

<div id="toast" class="glass toast"></div>

<script>
/* ───────────── generative background (seeded flow field — matches SOP Hub) ───────────── */
(function(){
  const c=document.getElementById('bgArt'), x=c.getContext('2d');
  const reduced=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let W,H; function fit(){W=c.width=innerWidth;H=c.height=innerHeight;} fit(); addEventListener('resize',fit);
  let seed=20260610; function rnd(){seed=(seed*1664525+1013904223)>>>0; return seed/4294967296;}
  const hues=[[47,155,214],[148,102,214],[54,163,122],[242,115,74]];
  const pts=[]; for(let i=0;i<70;i++){const h=hues[Math.floor(rnd()*hues.length)];
    pts.push({x:rnd()*innerWidth,y:rnd()*innerHeight,a:rnd()*Math.PI*2,s:.25+rnd()*.4,c:h,r:.6+rnd()*1.4});}
  function field(px,py,t){return Math.sin(px*.0016+t*.00012)*1.7+Math.cos(py*.0019-t*.00009)*1.7;}
  let t=0;
  function tick(){
    t++;
    x.fillStyle='rgba(245,247,250,0.045)'; x.fillRect(0,0,W,H);
    pts.forEach(p=>{
      const a=field(p.x,p.y,t);
      p.x+=Math.cos(a)*p.s; p.y+=Math.sin(a)*p.s;
      if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10; if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;
      x.beginPath(); x.arc(p.x,p.y,p.r,0,7);
      x.fillStyle='rgba('+p.c[0]+','+p.c[1]+','+p.c[2]+',0.18)'; x.fill();
    });
    if(!reduced) requestAnimationFrame(tick);
  }
  if(reduced){ for(let i=0;i<400;i++) tick(); } else tick();
})();

// ====================== CONFIG ======================
const TENANT_ID = "eeea7e3e-9ccb-4a16-894e-3417c6a7a4c1";
// Dedicated registration: "M1S Report Runner".
// SPA redirect URI registered: https://saulb96.github.io/report-runner/
const CLIENT_ID = "60dca5cd-4744-44e7-a747-84bc42640eed";
const REDIRECT_URI = window.location.origin + window.location.pathname;

// SharePoint site that hosts the request list + results library.
const SITE_URL = "https://met1sol.sharepoint.com/sites/Production";
const SP_SCOPE = "https://met1sol.sharepoint.com/AllSites.Write";

const LIST_TITLE = "On-Demand Report Requests";

// Report catalog lives in its own SharePoint list — add/edit reports there, not here.
// Columns (single line of text unless noted): ReportId, SourceTracker, SortOrder (number), Active (yes/no).
// Title = the report's display name.
const CATALOG_TITLE = "Report Catalog";

// Order the tracker groups appear in. Trackers not listed fall to the end, alphabetically.
const TRACKER_ORDER = ["PO Status Tracker", "Development Tracker", "Quote Directory"];

let REPORTS = []; // populated at runtime from the catalog list

// Instant trigger: paste the full URL from the flow's "When an HTTP request is received"
// trigger (includes the ?sp=…&sig=… signature). The page fires this the instant it
// creates a request item, so the flow starts immediately instead of waiting for a poll.
// Leave "" to fall back to a polling SharePoint trigger.
const FLOW_KICK_URL = "https://defaulteeea7e3e9ccb4a16894e3417c6a7a4.c1.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/84a410dee497462fb816a1cf52f0a592/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=LbDY1-4c6q8OAS19t_UZ8uJSs-hhU77as_XKl6Tw7zM";

const POLL_INTERVAL_MS = 2000;
const POLL_TIMEOUT_MS = 240000; // 4 min
// ====================================================

const msalApp = new window.msal.PublicClientApplication({
  auth: {
    clientId: CLIENT_ID,
    authority: "https://login.microsoftonline.com/" + TENANT_ID,
    redirectUri: REDIRECT_URI
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
});

let account = null;
let listEntityType = null;

// ---------- Auth ----------
async function initAuth() {
  await msalApp.initialize();
  const resp = await msalApp.handleRedirectPromise();
  if (resp && resp.account) account = resp.account;
  if (!account) {
    const all = msalApp.getAllAccounts();
    if (all.length) account = all[0];
  }
  if (account) showApp(); else showLogin();
}

async function login() {
  try {
    await msalApp.loginRedirect({ scopes: [SP_SCOPE] });
  } catch (e) { toast("Sign-in failed: " + e.message); }
}

function logout() { msalApp.logoutRedirect({ account }); }

async function getToken() {
  const req = { scopes: [SP_SCOPE], account };
  try { return (await msalApp.acquireTokenSilent(req)).accessToken; }
  catch { await msalApp.acquireTokenRedirect(req); throw new Error("Redirecting for sign-in…"); }
}

// ---------- SharePoint REST ----------
async function spGet(path) {
  const token = await getToken();
  const res = await fetch(SITE_URL + path, {
    headers: { Authorization: "Bearer " + token, Accept: "application/json;odata=nometadata" }
  });
  if (!res.ok) throw new Error("GET " + path + " -> " + res.status);
  return res.json();
}

async function getDigest() {
  const token = await getToken();
  const res = await fetch(SITE_URL + "/_api/contextinfo", {
    method: "POST",
    headers: { Authorization: "Bearer " + token, Accept: "application/json;odata=nometadata" }
  });
  if (!res.ok) throw new Error("contextinfo -> " + res.status);
  return (await res.json()).FormDigestValue;
}

async function getListEntityType() {
  if (listEntityType) return listEntityType;
  const j = await spGet("/_api/web/lists/getbytitle('" + encodeURIComponent(LIST_TITLE) +
    "')?$select=ListItemEntityTypeFullName");
  listEntityType = j.ListItemEntityTypeFullName;
  return listEntityType;
}

async function createRequest(reportId, mode) {
  const [token, digest, entityType] = await Promise.all([getToken(), getDigest(), getListEntityType()]);
  const body = {
    "__metadata": { "type": entityType },
    "Title": reportId,
    "ReportId": reportId,
    "Mode": mode,
    "Status": "Queued"
  };
  const res = await fetch(SITE_URL + "/_api/web/lists/getbytitle('" +
    encodeURIComponent(LIST_TITLE) + "')/items", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token,
      "X-RequestDigest": digest,
      Accept: "application/json;odata=verbose",
      "Content-Type": "application/json;odata=verbose"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error("create item -> " + res.status);
  return (await res.json()).d.Id;
}

async function pollItem(itemId) {
  const deadline = Date.now() + POLL_TIMEOUT_MS;
  while (Date.now() < deadline) {
    const item = await spGet("/_api/web/lists/getbytitle('" + encodeURIComponent(LIST_TITLE) +
      "')/items(" + itemId + ")?$select=Status,ResultFileUrl,ErrorMessage");
    if (item.Status === "Done") return item;
    if (item.Status === "Error") throw new Error(item.ErrorMessage || "Report generation failed.");
    await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
  }
  throw new Error("Timed out waiting for the report.");
}

async function downloadFile(serverRelativeUrl, suggestedName) {
  const token = await getToken();
  const res = await fetch(SITE_URL + "/_api/web/GetFileByServerRelativeUrl('" +
    serverRelativeUrl + "')/$value", {
    headers: { Authorization: "Bearer " + token }
  });
  if (!res.ok) throw new Error("download -> " + res.status);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = suggestedName || serverRelativeUrl.split("/").pop() || "report.xlsx";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

// ---------- Run ----------
async function runReport(report, mode, statusEl, buttons) {
  buttons.forEach(b => b.disabled = true);
  setStatus(statusEl, "busy", "Queued — this can take up to a minute.", true);
  try {
    const itemId = await createRequest(report.id, mode);
    if (FLOW_KICK_URL) {
      const u = FLOW_KICK_URL + (FLOW_KICK_URL.includes("?") ? "&" : "?") + "itemId=" + itemId;
      fetch(u, { method: "POST", mode: "no-cors" }).catch(() => {}); // fire-and-forget
    }
    setStatus(statusEl, "busy", "Generating report…", true);
    const item = await pollItem(itemId);
    if (mode === "download") {
      if (!item.ResultFileUrl) throw new Error("No file URL returned.");
      setStatus(statusEl, "busy", "Downloading…", true);
      await downloadFile(item.ResultFileUrl, report.name + ".xlsx");
      setStatus(statusEl, "ok", "Downloaded.");
    } else {
      setStatus(statusEl, "ok", "Sent to your inbox.");
    }
  } catch (e) {
    setStatus(statusEl, "err", e.message);
  } finally {
    buttons.forEach(b => b.disabled = false);
  }
}

// ---------- UI ----------
function srcClass(src) {
  if (src === "Quote Directory") return "green";
  if (src === "Development Tracker") return "orange";
  return "blue"; // PO Status Tracker
}

function setStatus(el, cls, msg, spinner) {
  el.className = "status " + (cls || "");
  el.innerHTML = (spinner ? '<span class="spinner"></span>' : "") + msg;
}

async function loadCatalog() {
  const j = await spGet("/_api/web/lists/getbytitle('" + encodeURIComponent(CATALOG_TITLE) +
    "')/items?$select=Title,ReportId,SourceTracker,SortOrder,Active&$top=500");
  const items = (j.value || [])
    .filter(it => it.Active !== false)        // hide rows where Active is unchecked
    .map(it => ({
      id:    (it.ReportId || "").trim(),
      name:  (it.Title || "").trim(),
      src:   (it.SourceTracker || "Other").trim(),
      order: typeof it.SortOrder === "number" ? it.SortOrder : 999
    }))
    .filter(r => r.id && r.name);
  REPORTS = items;
  return items;
}

function trackerRank(src) {
  const i = TRACKER_ORDER.indexOf(src);
  return i === -1 ? TRACKER_ORDER.length : i;
}

function buildCard(report) {
  const card = document.createElement("div");
  card.className = "glass card";

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerHTML =
    '<div class="name"></div>' +
    '<span class="src-pill"></span>' +
    '<div class="status"></div>';
  meta.querySelector(".name").textContent = report.name;
  const pill = meta.querySelector(".src-pill");
  pill.textContent = report.src;
  pill.classList.add(srcClass(report.src));
  const statusEl = meta.querySelector(".status");

  const actions = document.createElement("div");
  actions.className = "actions";
  const dl = document.createElement("button");
  dl.className = "btn"; dl.textContent = "Download";
  const em = document.createElement("button");
  em.className = "btn primary"; em.textContent = "Email me";
  const buttons = [dl, em];
  dl.onclick = () => runReport(report, "download", statusEl, buttons);
  em.onclick = () => runReport(report, "email", statusEl, buttons);
  actions.append(dl, em);

  card.append(meta, actions);
  return card;
}

function renderReports() {
  const grid = document.getElementById("reportGrid");
  grid.innerHTML = "";

  if (!REPORTS.length) {
    grid.innerHTML = '<div class="empty">No reports are configured yet. ' +
      'Add rows to the “' + CATALOG_TITLE + '” list to see them here.</div>';
    return;
  }

  // Group by source tracker
  const groups = new Map();
  REPORTS.forEach(r => {
    if (!groups.has(r.src)) groups.set(r.src, []);
    groups.get(r.src).push(r);
  });

  // Ordered tracker folders; reports sorted within each by SortOrder then name
  [...groups.keys()]
    .sort((a, b) => trackerRank(a) - trackerRank(b) || a.localeCompare(b))
    .forEach(src => {
      const reports = groups.get(src)
        .sort((a, b) => a.order - b.order || a.name.localeCompare(b.name));

      const folder = document.createElement("section");
      folder.className = "glass folder";

      const head = document.createElement("button");
      head.className = "folder-head";
      head.setAttribute("aria-expanded", "false");
      head.innerHTML =
        '<span class="folder-dot ' + srcClass(src) + '"></span>' +
        '<span class="folder-name"></span>' +
        '<span class="folder-count"></span>' +
        '<span class="chev">›</span>';
      head.querySelector(".folder-name").textContent = src;
      head.querySelector(".folder-count").textContent = reports.length;

      const wrap = document.createElement("div");
      wrap.className = "folder-body-wrap";
      const body = document.createElement("div");
      body.className = "folder-body";
      const inner = document.createElement("div");
      inner.className = "folder-body-inner";
      reports.forEach(r => inner.appendChild(buildCard(r)));
      body.appendChild(inner);
      wrap.appendChild(body);

      head.onclick = () => {
        const open = folder.classList.toggle("open");
        head.setAttribute("aria-expanded", open ? "true" : "false");
      };

      folder.append(head, wrap);
      grid.appendChild(folder);
    });
}

function showApp() {
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("appView").classList.remove("hidden");
  const nameEl = document.getElementById("userName");
  nameEl.textContent = account.name || account.username;
  nameEl.classList.remove("hidden");
  document.getElementById("logoutBtn").classList.remove("hidden");

  const grid = document.getElementById("reportGrid");
  grid.innerHTML = '<div class="empty"><span class="spinner"></span>Loading reports…</div>';
  loadCatalog()
    .then(renderReports)
    .catch(e => {
      grid.innerHTML = '<div class="empty err">Couldn’t load the report catalog: ' +
        e.message + '</div>';
    });
}

function showLogin() {
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 4000);
}
